<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2.1 Interact and Reflect: Colonial Frontier Massacres Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    /* Brand palette (matches sibling activity) */
    --purple:#351959;
    --white:#FFFFFF;
    --blue-deep:#191998;
    --blue-grey:#8CA7C9;
    --cyan-pale:#C2EBEB;
    --cyan-bright:#00C5FF;
    --violet:#BA61FF;
    --teal:#28D2D1;

    /* Semantic roles derived from the palette */
    --bg:var(--white);
    --bg-elevated: rgba(140,167,201,0.10);
    --ink:var(--purple);
    --ink-soft: rgba(53,25,89,0.72);
    --ink-faint: rgba(53,25,89,0.48);
    --line: rgba(53,25,89,0.16);
    --line-strong: rgba(53,25,89,0.30);

    --accent: var(--cyan-bright);
    --accent-ink: var(--purple);
    --accent-soft: rgba(0,197,255,0.14);
    --accent-glow: rgba(0,197,255,0.35);

    --current-glow: rgba(186,97,255,0.35);
    --done: var(--teal);

    --panel-bg: var(--cyan-pale);
    --panel-border: rgba(25,25,152,0.25);
    --panel-label: var(--blue-deep);

    --reassure-bg: rgba(186,97,255,0.10);
    --reassure-border: rgba(186,97,255,0.35);

    --attrib-bg: rgba(40,210,209,0.10);
    --attrib-border: rgba(40,210,209,0.45);

    --focus-ring: 0 0 0 3px var(--accent-glow);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .app{
    max-width:760px;
    margin:0 auto;
    padding:32px 24px 80px;
    min-height:100vh;
  }
  @media (max-width:600px){
    .app{padding:20px 16px 64px;}
  }

  /* ---------- Road progress ---------- */
  .road-wrap{
    position:relative;
    padding:18px 4px 28px;
    margin-bottom:8px;
  }
  .road-line{
    position:relative;
    height:4px;
    border-radius:2px;
    background:
      repeating-linear-gradient(to right,
        var(--blue-grey) 0px, var(--blue-grey) 14px,
        transparent 14px, transparent 26px);
    opacity:0.55;
  }
  .road-line-fill{
    position:absolute;
    top:0; left:0; height:4px;
    border-radius:2px;
    background:linear-gradient(to right, var(--blue-deep), var(--cyan-bright));
    transition:width 0.5s ease;
  }
  .stops{
    position:relative;
    display:flex;
    justify-content:space-between;
    margin-top:-8px;
  }
  .stop{
    width:16px;height:16px;border-radius:50%;
    background:var(--white);
    border:2px solid var(--blue-grey);
    display:flex;align-items:center;justify-content:center;
    transition:all 0.35s ease;
    flex-shrink:0;
  }
  .stop.done{
    background:var(--teal);
    border-color:var(--teal);
  }
  .stop.current{
    background:var(--white);
    border-color:var(--cyan-bright);
    box-shadow:0 0 0 6px var(--accent-soft), 0 0 14px 3px var(--current-glow);
  }
  .stop-label{
    position:absolute;
    top:22px;
    font-size:10px;
    letter-spacing:0.04em;
    color:var(--ink-faint);
    white-space:nowrap;
    transform:translateX(-50%);
    display:none;
  }
  @media (min-width:600px){
    .stop-label{display:block;}
  }

  /* ---------- Header ---------- */
  .eyebrow{
    font-size:12px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--blue-deep);
    font-weight:700;
    margin:28px 0 6px;
  }
  h1.title{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(26px,4vw,34px);
    line-height:1.15;
    margin:0 0 4px;
    color:var(--ink);
  }
  .subtitle{
    color:var(--ink-soft);
    font-size:14px;
    margin-bottom:22px;
  }

  /* ---------- Cards ---------- */
  .card{
    background:var(--bg-elevated);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px 22px;
    margin-bottom:18px;
  }
  .card p{margin:0 0 12px; line-height:1.6; font-size:15px; color:var(--ink-soft);}
  .card p:last-child{margin-bottom:0;}
  .label{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    color:var(--ink-soft);
    font-weight:700;
    margin-bottom:10px;
    display:block;
  }
  .reflect-list{
    margin:0; padding-left:18px;
    color:var(--ink);
    font-size:15px;
    line-height:1.7;
  }
  .reflect-list li{margin-bottom:6px;}

  .examples-panel{
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:18px 22px;
    margin-bottom:18px;
  }
  .examples-panel .label{color:var(--panel-label);}
  .examples-panel ul{margin:0;padding-left:18px;font-size:14.5px;line-height:1.65; color:var(--ink);}

  /* ---------- Attribution (secondary, sits below Begin) ---------- */
  .attrib-panel{
    border-top:1px solid var(--line);
    margin-top:26px;
    padding-top:14px;
    font-size:12.5px;
    line-height:1.6;
    color:var(--ink-faint);
  }
  .attrib-panel .label{
    color:var(--ink-faint);
    font-size:11px;
    margin-bottom:4px;
  }
  .attrib-panel a{color:var(--ink-soft); font-weight:600;}

  .map-launcher{
    display:flex;
    align-items:center;
    gap:18px;
    border:1px solid var(--line-strong);
    border-radius:10px;
    padding:20px 22px;
    margin-bottom:18px;
    background:linear-gradient(135deg, var(--bg-elevated), rgba(0,197,255,0.08));
  }
  .map-launcher-icon{
    flex-shrink:0;
    width:48px;height:48px;
    border-radius:10px;
    background:var(--purple);
    display:flex;align-items:center;justify-content:center;
    color:var(--white);
    font-size:22px;
  }
  .map-launcher-body{flex:1; min-width:0;}
  .map-launcher-body .label{margin-bottom:4px;}
  .map-launcher-body p{margin:0; font-size:14px; color:var(--ink-soft); line-height:1.55;}
  @media (max-width:520px){
    .map-launcher{flex-direction:column; align-items:flex-start;}
  }
  .link-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    font-size:14px;
    color:var(--accent-ink);
    text-decoration:none;
    background:var(--cyan-bright);
    border:1px solid transparent;
    border-radius:8px;
    padding:11px 18px;
    transition:transform 0.15s ease;
    white-space:nowrap;
    flex-shrink:0;
  }
  .link-btn:hover{transform:translateY(-1px);}
  .link-btn:focus-visible{outline:none; box-shadow:var(--focus-ring);}

  textarea{
    width:100%;
    min-height:110px;
    background:var(--white);
    border:1px solid var(--line-strong);
    border-radius:8px;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:15px;
    padding:14px;
    resize:vertical;
    line-height:1.55;
  }
  textarea::placeholder{color:var(--ink-faint);}
  textarea:focus{
    outline:none;
    border-color:var(--cyan-bright);
    box-shadow:var(--focus-ring);
  }

  .field{margin-bottom:22px;}
  .field:last-child{margin-bottom:0;}

  /* ---------- Nav buttons ---------- */
  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:28px;
  }
  button{
    font-family:'Inter',sans-serif;
    font-weight:700;
    font-size:14.5px;
    border-radius:8px;
    padding:12px 22px;
    cursor:pointer;
    border:1px solid transparent;
    transition:transform 0.15s ease, background 0.15s ease;
  }
  button:focus-visible{outline:none; box-shadow:var(--focus-ring);}
  .btn-primary{
    background:var(--cyan-bright);
    color:var(--accent-ink);
  }
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-ghost{
    background:transparent;
    color:var(--ink-soft);
    border-color:var(--line-strong);
  }
  .btn-ghost:hover{color:var(--ink); border-color:var(--purple);}
  .btn-ghost:disabled{opacity:0.35; cursor:default;}
  .btn-ghost:disabled:hover{color:var(--ink-soft); border-color:var(--line-strong);}

  /* ---------- Intro / final screens ---------- */
  .intro, .final{
    padding-top:12px;
  }
  .intro h1, .final h1{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:clamp(28px,4.5vw,38px);
    line-height:1.18;
    margin:6px 0 18px;
    color:var(--ink);
  }
  .intro p, .final p{line-height:1.65; font-size:15.5px; color:var(--ink-soft);}
  .reassure{
    background:var(--reassure-bg);
    border:1px solid var(--reassure-border);
    border-radius:10px;
    padding:16px 18px;
    font-size:14.5px;
    color:var(--ink);
    margin:20px 0 28px;
  }
  .summary-list{list-style:none;margin:0 0 28px;padding:0;}
  .summary-list li{
    display:flex; align-items:baseline; gap:10px;
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:14.5px;
    color:var(--ink);
  }
  .summary-list li:last-child{border-bottom:none;}
  .summary-list .mark{color:var(--teal); font-weight:700;}
  .summary-list .muted{color:var(--ink-faint); font-size:13px;}

  .fade{animation:fadeIn 0.35s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

  @media (prefers-reduced-motion: reduce){
    .fade{animation:none;}
    .road-line-fill{transition:none;}
    button{transition:none;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const MAP_URL = "https://c21ch.newcastle.edu.au/colonialmassacres/map.php";

// ---------- Step data ----------
const STEPS = [
  {
    key: "explore",
    name: "Explore the Map",
    dates: "General reflection",
    context: "Take a look at the map of colonial frontier massacres. Use the questions below to guide your reflections about your own region. You can download your responses as a PDF at the end of the activity.",
    questions: [
      "What massacres happened near where you live or work?",
      "When did they occur?",
      "What events led up to these massacres?",
      "Who and how many were killed?",
      "What happened to the people who committed these massacres?",
      "Are these massacres commemorated in any way? For example, a memorial?",
      "Consider the possibility that there may have been massacres in your area that are not listed on the map. Do you know of any of these?"
    ],
    fieldLabel: "Your reflection: what you found",
    placeholder: "Record what you found on the map, and what you already knew, about your region..."
  },
  {
    key: "focus",
    name: "A Closer Look: 1910–1930",
    dates: "Focused task",
    context: "On the map, slide the year scale so it only shows massacres that occurred from 1910 until 1930.",
    questions: [
      "Notice how many massacres still occurred in this period, and the numbers of Aboriginal people killed.",
      "Consider what was happening in Australia during these years. Aboriginal people were fighting for Australia in the First World War, yet were still able to be massacred with impunity."
    ],
    fieldLabel: "Your reflection: 1910–1930",
    placeholder: "What stood out to you about massacres occurring in this period?"
  }
];

const state = {
  screen: "intro", // intro | step | final
  stepIndex: 0,
  answers: STEPS.map(() => ({ text: "" })),
  mapLoadFailed: false
};

const app = document.getElementById("app");

function renderRoad(activeIndex){
  const total = STEPS.length;
  const pct = activeIndex <= 0 ? 0 : (activeIndex / (total - 1)) * 100;
  let stops = "";
  STEPS.forEach((step, i) => {
    let cls = "stop";
    if (i < activeIndex) cls += " done";
    if (i === activeIndex) cls += " current";
    stops += `<div style="position:relative;">
      <div class="${cls}"></div>
      <div class="stop-label">${step.name.split(":")[0]}</div>
    </div>`;
  });
  return `
    <div class="road-wrap">
      <div class="road-line"><div class="road-line-fill" style="width:${pct}%;"></div></div>
      <div class="stops">${stops}</div>
    </div>`;
}

function renderAttribution(){
  return `
    <div class="attrib-panel">
      <span class="label">Acknowledging the source of this map</span>
      This map is the <strong>Colonial Frontier Massacres in Australia, 1788–1930</strong> project, produced by the Centre for 21st Century Humanities at the University of Newcastle, led by Emeritus Professor Lyndall Ryan AM and a team of historians and researchers.
    </div>`;
}

function renderMapEmbed(){
  return `
    <div class="map-launcher">
      <div class="map-launcher-icon">🗺</div>
      <div class="map-launcher-body">
        <span class="label">Colonial Frontier Massacres Map</span>
        <p>Open the map in a new tab and keep it open alongside this page. You'll refer back to it as you work through the questions below.</p>
      </div>
      <a class="link-btn" href="${MAP_URL}" target="_blank" rel="noopener">Open the map ↗</a>
    </div>`;
}

function renderIntro(){
  app.innerHTML = `
    <div class="intro fade">
      ${renderRoad(-1)}
      <div class="eyebrow">2.1 Interact and Reflect</div>
      <h1>Colonial Frontier Massacres Map</h1>
      <p>Take a look at the map of colonial frontier massacres. This activity asks you to explore what happened near where you live or work, and to sit with what the map reveals about your own region's history.</p>
      <div class="nav-row" style="justify-content:flex-end;">
        <button class="btn-primary" onclick="goToStep(0)">Begin →</button>
      </div>
      ${renderAttribution()}
    </div>`;
}

function renderStep(i){
  const step = STEPS[i];
  const a = state.answers[i];
  app.innerHTML = `
    <div class="step fade">
      ${renderRoad(i)}
      <div class="eyebrow">Part ${i+1} of ${STEPS.length}</div>
      <h1 class="title">${step.name}</h1>
      <div class="subtitle">${step.dates}</div>

      ${renderMapEmbed()}

      <div class="card">
        ${step.context ? `<p>${step.context}</p>` : ""}
        ${step.questions.length ? `
        <span class="label">Reflect on</span>
        <ul class="reflect-list">
          ${step.questions.map(q => `<li>${q}</li>`).join("")}
        </ul>` : ""}
      </div>

      <div class="field">
        <span class="label">${step.fieldLabel}</span>
        <textarea id="answer-input" placeholder="${step.placeholder}">${a.text}</textarea>
      </div>

      <div class="nav-row">
        <button class="btn-ghost" ${i===0 ? "disabled" : ""} onclick="goBack()">← Back</button>
        <button class="btn-primary" onclick="goNext()">${i === STEPS.length-1 ? "Finish →" : "Next →"}</button>
      </div>
    </div>`;
}

function renderFinal(){
  app.innerHTML = `
    <div class="final fade">
      ${renderRoad(STEPS.length)}
      <div class="eyebrow">Activity complete</div>
      <h1>Thank you for completing this exercise.</h1>
      <p>Here's what you've reflected on so far. Download it as a PDF to keep, revisit, or bring to a conversation with your local Elders and community organisations. Remember, this map, and your own reflections, are both things you can keep returning to over time.</p>
      <ul class="summary-list">
        ${STEPS.map((step, i) => {
          const a = state.answers[i];
          const filled = a.text.trim();
          return `<li><span class="mark">${filled ? "✓" : "–"}</span> ${step.name} <span class="muted">(${step.dates})</span></li>`;
        }).join("")}
      </ul>
      <div class="nav-row" style="justify-content:space-between;">
        <button class="btn-ghost" onclick="goToStep(${STEPS.length - 1})">← Back to edit</button>
        <button class="btn-primary" onclick="downloadPDF()">Download my reflections (PDF)</button>
      </div>
    </div>`;
}

function saveCurrentInput(){
  if (state.screen === "step"){
    const el = document.getElementById("answer-input");
    if (el) state.answers[state.stepIndex].text = el.value;
  }
}

function goToStep(i){
  saveCurrentInput();
  state.screen = "step";
  state.stepIndex = i;
  renderStep(i);
  window.scrollTo({top:0, behavior:"smooth"});
}

function goNext(){
  saveCurrentInput();
  if (state.stepIndex < STEPS.length - 1){
    goToStep(state.stepIndex + 1);
  } else {
    state.screen = "final";
    renderFinal();
    window.scrollTo({top:0, behavior:"smooth"});
  }
}

function goBack(){
  saveCurrentInput();
  if (state.stepIndex > 0) goToStep(state.stepIndex - 1);
}

function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "pt", format: "a4" });
  const marginX = 48;
  let y = 56;
  const pageHeight = doc.internal.pageSize.getHeight();
  const maxWidth = doc.internal.pageSize.getWidth() - marginX * 2;

  function ensureSpace(lines){
    if (y + lines * 14 > pageHeight - 48){
      doc.addPage();
      y = 56;
    }
  }

  doc.setFont("helvetica", "bold");
  doc.setFontSize(16);
  doc.text("2.1 Interact and Reflect: Colonial Frontier Massacres Map", marginX, y);
  y += 22;

  doc.setFont("helvetica", "normal");
  doc.setFontSize(9.5);
  ensureSpace(2);
  const attribLines = doc.splitTextToSize(
    "Map source: Colonial Frontier Massacres in Australia, 1788-1930, Centre for 21st Century Humanities, University of Newcastle (c21ch.newcastle.edu.au/colonialmassacres/map.php).",
    maxWidth
  );
  doc.text(attribLines, marginX, y);
  y += attribLines.length * 12 + 18;

  STEPS.forEach((step, i) => {
    const a = state.answers[i];
    ensureSpace(3);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(13);
    doc.text(`${step.name} (${step.dates})`, marginX, y);
    y += 18;

    if (step.questions.length){
      doc.setFont("helvetica", "bold");
      doc.setFontSize(10.5);
      ensureSpace(1);
      doc.text("Reflect on:", marginX, y);
      y += 14;
      doc.setFont("helvetica", "normal");
      step.questions.forEach(q => {
        const qLines = doc.splitTextToSize(`•  ${q}`, maxWidth);
        ensureSpace(qLines.length);
        doc.text(qLines, marginX, y);
        y += qLines.length * 13 + 2;
      });
      y += 6;
    }

    doc.setFont("helvetica", "bold");
    doc.setFontSize(10.5);
    ensureSpace(1);
    doc.text(`${step.fieldLabel}:`, marginX, y);
    y += 14;
    doc.setFont("helvetica", "normal");
    const answerText = a.text.trim() || "(no response entered)";
    const answerLines = doc.splitTextToSize(answerText, maxWidth);
    ensureSpace(answerLines.length);
    doc.text(answerLines, marginX, y);
    y += answerLines.length * 13 + 24;
  });

  doc.save("2-1-interact-and-reflect-my-reflections.pdf");
}

renderIntro();
</script>
</body>
</html>
